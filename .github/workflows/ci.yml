name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  common-tests:
    name: Common unit tests (JUnit + JaCoCo 90% gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :common:check
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: common/build/reports/jacoco/test/
          retention-days: 7
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: common/build/reports/jacoco/test/jacocoTestReport.xml
          flags: common
          fail_ci_if_error: false
        continue-on-error: true

  build-matrix:
    name: Build ${{ matrix.mc_version }}
    runs-on: ubuntu-latest
    needs: common-tests
    strategy:
      fail-fast: false
      matrix:
        mc_version: ["1.21.1", "1.21.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Build
        run: ./gradlew :neoforge-${{ matrix.mc_version }}:build
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: lockers-${{ matrix.mc_version }}-jars
          path: neoforge-${{ matrix.mc_version }}/build/libs/*.jar
          retention-days: 14

  gametest:
    name: GameTest ${{ matrix.mc_version }}
    runs-on: ubuntu-latest
    needs: build-matrix
    strategy:
      fail-fast: false
      matrix:
        mc_version: ["1.21.1", "1.21.4"]
    # GameTest not yet implemented in the scaffold — this job is wired up so
    # it runs as soon as tests are added under neoforge-*/src/gametest/.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Run GameTest server
        run: ./gradlew :neoforge-${{ matrix.mc_version }}:runGameTestServer
